<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>F1 Clash Companion – Setup-Optimizer</title>
  <meta name="theme-color" content="#0a0d17" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="assets/ferrari2000_candyred_192.png" />
  <link rel="apple-touch-icon" href="assets/ferrari2000_candyred_192.png" />
  <link rel="stylesheet" href="style.css" />
  <script src="vendor/chart.umd.min.js"></script>
  <script src="i18n.js"></script>
  <script defer src="script.js"></script>
  <script defer src="advanced.js"></script>
</head>
<body class="neon-body main-cockpit optimizer-page">
  <div class="app-shell">
    <div class="lang-bar neon-card app-lang-bar" style="display:flex;align-items:center;gap:0.6rem;padding:0.5rem 1.2rem;">
      <span data-i18n="lang_label" style="color:var(--text-muted,#9aa2c0);font-size:0.9rem;">Sprache</span>
      <select id="appLangSelect" style="background:#0d0f1e;color:#f7f8fc;border:1px solid rgba(255,255,255,.18);border-radius:0.5rem;padding:0.3rem 0.7rem;font-size:0.9rem;cursor:pointer;">
        <option value="de">🇩🇪 Deutsch</option>
        <option value="it">🇮🇹 Italiano</option>
        <option value="en">🇬🇧 English</option>
      </select>
    </div>
    <header class="topbar neon-card main-topbar">
      <div class="brand">
        <img src="assets/ferrari2000_candyred_192.png" alt="F1 Neon Nights" class="brand-icon" />
        <div>
          <h1 data-i18n="optPage_h1">Setup-Optimizer & KI-Strategie</h1>
          <p data-i18n="optPage_sub">Eigenständige Optimizer-Seite für F1 Clash Companion</p>
        </div>
      </div>
      <div class="season-control">
        <a class="pill ghost-link" href="index.html" onclick="if (history.length > 1) { history.back(); return false; }" data-i18n="back_main_btn">Zurück zur Hauptseite</a>
      </div>
    </header>

    <nav class="subnav neon-card main-subnav optimizer-subnav" aria-label="Optimizer Schnellnavigation">
      <a href="#optimizer" data-i18n="optimizer_h2">Setup-Optimizer</a>
      <a href="sync.html" data-i18n="nav_sync">Account-Sync</a>
    </nav>

    <main>
      <section id="optimizer" class="panel neon-card">
        <header>
          <h2 data-i18n="optimizer_h2">Setup-Optimizer & KI-Strategie</h2>
        </header>
        <div class="row">
          <label for="trackSelect" data-i18n="track_lbl">Strecke</label>
          <select id="trackSelect"></select>
          <button id="autoBuildButton" class="pill pill--primary" data-i18n="auto_setup_btn">AutoSetup erstellen</button>
        </div>
        <div class="row">
          <button id="optimizeButton" class="pill pill--primary" data-i18n="best_setup_btn">Bestes Setup für Strecke</button>
          <button id="optimizeAllButton" class="pill pill--ghost" data-i18n="all_tracks_btn">Alle Strecken simulieren</button>
        </div>
        <div class="radar-wrap">
          <svg id="trackCircuitSvg" class="circuit-bg" viewBox="0 0 300 200" preserveAspectRatio="xMidYMid meet" aria-hidden="true"></svg>
          <canvas id="trackRadarChart" height="220"></canvas>
        </div>
        <canvas id="seasonBestChart" height="200"></canvas>
        <div id="optimizerResult" class="result"></div>
        <div class="row">
          <label for="strategyTrackSelect" data-i18n="strategy_track_lbl">Strategie-Strecke</label>
          <select id="strategyTrackSelect"></select>
          <label for="strategyMode" data-i18n="strategy_mode_lbl">Strategie</label>
          <select id="strategyMode">
            <option value="auto" data-i18n="opt_auto">Auto</option>
            <option value="one_stop" data-i18n="opt_one_stop">1-Stop</option>
            <option value="two_stop" data-i18n="opt_two_stop">2-Stop</option>
            <option value="balanced" data-i18n="opt_balanced">Balanced</option>
            <option value="aggressive" data-i18n="opt_aggressive">Aggressive</option>
          </select>
          <button id="strategyButton" class="pill pill--primary" data-i18n="strategy_btn">Strategie kalkulieren</button>
          <button id="raceSimButton" class="pill pill--primary" data-i18n="race_sim_btn">Rennen simulieren</button>
        </div>
        <div class="chart-choice-row" aria-label="Renn-Diagramm Auswahl">
          <p class="chart-choice-title" data-i18n="chart_choice_lbl">Renn-Diagramm Auswahl</p>
          <div class="chart-choice-tabs" role="tablist" aria-label="Renn-Diagramm Auswahl">
            <button type="button" class="pill pill--ghost chart-choice-tab" data-choice-tab="strategy" role="tab" aria-selected="false" data-i18n="chart_choice_strategy">Strategie-Vergleich</button>
            <button type="button" class="pill pill--ghost chart-choice-tab" data-choice-tab="race" role="tab" aria-selected="true" data-i18n="chart_choice_race">Rundenzeiten</button>
            <button type="button" class="pill pill--ghost chart-choice-tab" data-choice-tab="position" role="tab" aria-selected="false" data-i18n="chart_choice_position">Positionsverlauf</button>
            <button type="button" class="pill pill--ghost chart-choice-tab" data-choice-tab="driverImpact" role="tab" aria-selected="false" data-i18n="chart_choice_driver">Driver Impact</button>
          </div>
        </div>
        <canvas id="strategyChart" data-choice-chart="strategy" height="180"></canvas>
        <canvas id="raceChart" data-choice-chart="race" height="200"></canvas>
        <canvas id="positionChart" data-choice-chart="position" height="180"></canvas>
        <div id="strategyResult" data-choice-result="strategy" class="result"></div>
        <div class="row">
          <label for="driverImpactMode" data-i18n="driver_impact_lbl">Driver Impact Modus</label>
          <select id="driverImpactMode">
            <option value="effective" data-i18n="opt_effective">Top 5 Effektivwert</option>
            <option value="stage" data-i18n="opt_stage">Top 5 Stage-Einfluss</option>
            <option value="community" data-i18n="opt_community">Top 5 Community-Boosted</option>
          </select>
        </div>
        <div id="driverImpactResult" data-choice-result="driverImpact" class="result"></div>
        <canvas id="driverImpactChart" data-choice-chart="driverImpact" height="180"></canvas>
        <div id="raceResult" data-choice-result="race" class="result"></div>
      </section>
    </main>

    <div id="chartPopup" class="chart-popup" hidden>
      <div class="chart-popup-backdrop" data-popup-close="true"></div>
      <div class="chart-popup-dialog neon-card" role="dialog" aria-modal="true" aria-labelledby="chartPopupTitle">
        <div class="chart-popup-header">
          <div>
            <h3 id="chartPopupTitle">Diagrammwerte</h3>
            <p id="chartPopupSubtitle" class="chart-popup-subtitle"></p>
          </div>
          <div class="chart-popup-actions">
            <button id="chartSeriesReset" class="pill pill--ghost" type="button">Serie zurücksetzen</button>
            <button id="chartPopupFullscreen" class="pill pill--ghost" type="button">Fullscreen</button>
            <button id="chartPopupClose" class="pill pill--ghost" type="button">Schließen</button>
          </div>
        </div>
        <div class="chart-popup-table-wrap">
          <table class="data-table chart-popup-table">
            <thead id="chartPopupHead"></thead>
            <tbody id="chartPopupBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <footer class="footer neon-card">
      <p>Copyright © Sunwalker NP</p>
    </footer>
  </div>
</body>
</html>
