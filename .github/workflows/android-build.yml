name: Android Build & Release

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── Gradle dependency cache ──────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install Dependencies
        run: npm ci

      - name: Build Web Assets
        run: npm run build:web

      - name: Capacitor Sync Android
        run: npx cap sync android

      - name: Make Gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8"
        run: ./gradlew assembleDebug --no-daemon --build-cache --warning-mode none

      - name: Rename APK
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             F1ClashCompanion-debug-${SHORT_SHA}.apk
          echo "APK_NAME=F1ClashCompanion-debug-${SHORT_SHA}.apk" >> $GITHUB_ENV

      # ── Backup: APK immer als Actions-Artefakt hochladen ────────
      - name: Upload APK Artifact (Backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apk-debug-${{ github.sha }}
          path: ${{ env.APK_NAME }}
          if-no-files-found: warn
          retention-days: 14

      - name: Delete existing latest-android tag (if any)
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git tag -d latest-android 2>/dev/null || true
          git push origin :refs/tags/latest-android 2>/dev/null || true

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-android
          name: "F1 Clash Companion – Android (Latest Debug)"
          body: |
            Automatisch gebaut aus Branch `master` — Commit `${{ github.sha }}`

            **Installation:**
            1. APK herunterladen
            2. Auf dem Android-Gerät: Einstellungen → Unbekannte Quellen erlauben
            3. APK installieren
          files: ${{ env.APK_NAME }}
          prerelease: true
