name: iOS Build (macOS Runner)

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Web Assets
        run: npm run build:web

      - name: Capacitor Sync iOS
        run: npx cap sync ios

      - name: Install CocoaPods
        working-directory: ios/App
        run: pod install --repo-update

      - name: Build iOS Simulator (unsigned)
        working-directory: ios/App
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            | xcpretty || true

      - name: Package Simulator .app as ZIP
        run: |
          APP_PATH=$(find ios/App/build/Build/Products/Debug-iphonesimulator -name "App.app" -maxdepth 1 | head -1)
          if [ -n "$APP_PATH" ]; then
            cd "$(dirname "$APP_PATH")"
            zip -r F1ClashCompanion-Simulator.zip App.app
            echo "Packaged: $(ls -lh F1ClashCompanion-Simulator.zip)"
          else
            echo "No .app found, checking build output..."
            find ios/App/build -name "*.app" 2>/dev/null | head -5
          fi

      - name: Upload Simulator Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: F1ClashCompanion-iOS-Simulator
          path: ios/App/build/Build/Products/Debug-iphonesimulator/F1ClashCompanion-Simulator.zip
          if-no-files-found: warn
          retention-days: 14
