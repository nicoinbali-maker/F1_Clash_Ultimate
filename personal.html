<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>F1 Clash Companion - Persönlich</title>
  <meta name="theme-color" content="#0a0d17" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="assets/ferrari2000_candyred_192.png" />
  <link rel="apple-touch-icon" href="assets/ferrari2000_candyred_192.png" />
  <link rel="stylesheet" href="style.css" />
  <script src="i18n.js"></script>
  <script defer src="script.js"></script>
</head>
<body class="neon-body main-cockpit">
  <script>
    (function () {
      let ok = false;
      try { ok = !!localStorage.getItem('f1clashRegistration'); } catch {}
      if (!ok) { try { ok = !!sessionStorage.getItem('f1clashRegistration'); } catch {} }
      if (!ok) { try { const _fb = JSON.parse(localStorage.getItem('f1clashFirebaseAuth') || 'null'); ok = !!(_fb?.localId && _fb?.refreshToken); } catch {} }
      if (!ok) { window.location.replace('registration.html?next=personal.html'); }
    })();
  </script>

  <div class="app-shell">
    <div class="lang-bar neon-card app-lang-bar" style="display:flex;align-items:center;gap:0.6rem;padding:0.5rem 1.2rem;">
      <span data-i18n="lang_label" style="color:var(--text-muted,#9aa2c0);font-size:0.9rem;">Sprache</span>
      <select id="appLangSelect" style="background:#0d0f1e;color:#f7f8fc;border:1px solid rgba(255,255,255,.18);border-radius:0.5rem;padding:0.3rem 0.7rem;font-size:0.9rem;cursor:pointer;">
        <option value="de">🇩🇪 Deutsch</option>
        <option value="it">🇮🇹 Italiano</option>
        <option value="en">🇬🇧 English</option>
      </select>
    </div>

    <header class="topbar neon-card main-topbar">
      <div class="brand">
        <img src="assets/ferrari2000_candyred_192.png" alt="F1 Neon Nights" class="brand-icon" />
        <div>
          <h1 data-i18n="personal_h2">Persönliches Dashboard</h1>
          <p data-i18n="brand_subtitle">Ultimate Toolkit für saisonale Optimierung & Hall of Fame</p>
        </div>
      </div>
      <div class="row">
        <a class="pill ghost-link" href="index.html" data-i18n="nav_dashboard">Dashboard</a>
        <a class="pill ghost-link" href="leaderboard.html" data-i18n="nav_leaderboard">Leaderboard</a>
      </div>
    </header>

    <nav class="subnav neon-card main-subnav" aria-label="App Navigation">
      <a href="index.html" data-i18n="nav_dashboard">Dashboard</a>
      <a href="garage.html" data-i18n="nav_garage">Garage</a>
      <a href="optimizer.html" data-i18n="nav_optimizer">Optimizer</a>
      <a href="sync.html" data-i18n="nav_sync">Account-Sync</a>
      <a href="optimizer.html" data-i18n="nav_race">Simulator</a>
      <a href="team.html" data-i18n="nav_clan">Clan</a>
      <a href="leaderboard.html" data-i18n="nav_leaderboard">Leaderboard</a>
      <a href="hall-of-fame.html" data-i18n="nav_hof">Hall of Fame</a>
      <a href="personal.html" class="is-active" aria-current="page" data-i18n="nav_personal">Persönlich</a>
      <a href="registration.html?next=personal.html" data-i18n="nav_registration">Registrierung</a>
    </nav>

    <main>
      <section id="personal" class="panel neon-card">
        <header>
          <h2 data-i18n="personal_h2">Persönliches Dashboard</h2>
        </header>
        <div class="row">
          <button id="refreshPersonalSuggestionsButton" class="pill" data-i18n="refresh_suggestions_btn">Empfehlungen aktualisieren</button>
          <button id="enableNotificationsButton" class="pill" data-i18n="enable_notif_btn">Push aktivieren</button>
          <button id="notifyRaceButton" class="pill" data-i18n="notify_race_btn">Race-Push senden</button>
          <button id="notifyPitButton" class="pill" data-i18n="notify_pit_btn">Pit-Push planen</button>
        </div>
        <div class="row">
          <label for="friendCompareSelect" data-i18n="friend_compare_lbl">Freund/Clanmitglied</label>
          <select id="friendCompareSelect"></select>
          <button id="compareFriendButton" class="pill" data-i18n="compare_btn">Vergleichen</button>
        </div>
        <div class="suggestion-grid" id="personalSuggestions"></div>
        <div id="personalSuggestionsResult" class="result"></div>
        <div id="friendCompareResult" class="result"></div>
        <div class="notifications">
          <h3 data-i18n="push_log_h3">Push-Log & Empfehlungen</h3>
          <div id="notificationLog"></div>
        </div>
        <div id="notificationStatusResult" class="result"></div>
      </section>
    </main>

    <footer class="footer neon-card">
      <p data-i18n="copyright">Copyright © Sunwalker NP</p>
    </footer>
  </div>
</body>
</html>
