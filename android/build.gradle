// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.7.3'
        classpath 'com.google.gms:google-services:4.4.0'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

def localAppData = System.getenv('LOCALAPPDATA')
if (localAppData) {
    def externalRoot = new File(localAppData, 'F1ClashCompanion_Ultimate/gradle-build')
    rootProject.buildDir = new File(externalRoot, 'root')
    subprojects { project ->
        project.buildDir = new File(externalRoot, project.name)
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
